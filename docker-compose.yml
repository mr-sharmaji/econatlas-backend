services:
  postgres:
    # Official pgvector image (Debian bookworm + PG 16 + pgvector
    # preinstalled). Same PG 16 on-disk format as the previous
    # postgres:16-alpine, so the existing postgres_data volume is
    # preserved — no data migration.
    #
    # One note: this is a libc switch (musl on the old Alpine image →
    # glibc on Debian). Postgres may log a one-time warning on first
    # boot about collation version mismatch for text indexes. This is
    # cosmetic for ASCII-heavy data like ours; if it appears, clear it
    # with a single command:
    #    docker compose exec postgres psql -U econatlas -d econatlas \
    #        -c "REINDEX DATABASE econatlas;"
    image: pgvector/pgvector:pg16
    container_name: econatlas-postgres
    restart: always
    environment:
      POSTGRES_USER: econatlas
      POSTGRES_PASSWORD: econatlas
      POSTGRES_DB: econatlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U econatlas -d econatlas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: econatlas-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: econatlas-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://econatlas:econatlas@postgres:5432/econatlas
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: DEBUG
      FIREBASE_CREDENTIALS_JSON: /app/firebase-key.json
    volumes:
      - ./firebase-key.json:/app/firebase-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
