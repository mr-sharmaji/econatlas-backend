name: Deploy to Windows Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command "& '{0}'"

    env:
      DEPLOY_DIR: C:\PersonalProjects\econatlas-backend
      SERVICE_NAME: econatlas-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to deployment directory
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path $env:DEPLOY_DIR)) {
            New-Item -ItemType Directory -Path $env:DEPLOY_DIR -Force | Out-Null
          }

          # Mirror source to deploy dir, preserving .env and .venv
          robocopy . $env:DEPLOY_DIR /MIR `
            /XD .git .github .venv __pycache__ _work logs `
            /XF .env .DS_Store
          # robocopy exit codes 0-7 are success
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          else { throw "robocopy failed with exit code $LASTEXITCODE" }

      - name: Set up virtual environment and install dependencies
        run: |
          $ErrorActionPreference = "Stop"
          $venv = Join-Path $env:DEPLOY_DIR ".venv"
          $pip  = Join-Path $venv "Scripts\pip.exe"

          if (-not (Test-Path (Join-Path $venv "Scripts\python.exe"))) {
            Write-Host "Creating virtual environment..."
            python -m venv $venv
          }

          Write-Host "Installing dependencies..."
          & $pip install --upgrade pip --quiet
          & $pip install -r (Join-Path $env:DEPLOY_DIR "requirements.txt") --quiet

      - name: Restart Windows service (stop/start with checks)
        run: |
          $ErrorActionPreference = "Stop"

          function Wait-ServiceStatus {
            param(
              [string]$Name,
              [string]$Expected,
              [int]$TimeoutSeconds = 45
            )

            $deadline = (Get-Date).AddSeconds($TimeoutSeconds)
            while ((Get-Date) -lt $deadline) {
              $current = nssm status $Name
              if ($current -match $Expected) {
                Write-Host "Service status reached expected state: $current"
                return
              }
              Start-Sleep -Seconds 1
            }
            throw "Timed out waiting for service '$Name' to reach status '$Expected'. Last status: $(nssm status $Name)"
          }

          Write-Host "Stopping service..."
          nssm stop $env:SERVICE_NAME | Out-Null
          Wait-ServiceStatus -Name $env:SERVICE_NAME -Expected "SERVICE_STOPPED"

          Start-Sleep -Seconds 2

          Write-Host "Starting service..."
          nssm start $env:SERVICE_NAME | Out-Null
          Wait-ServiceStatus -Name $env:SERVICE_NAME -Expected "SERVICE_RUNNING"

      - name: Verify deployed routes are live
        run: |
          $ErrorActionPreference = "Stop"

          $openapiUrl = "http://127.0.0.1:8000/openapi.json"
          Write-Host "Checking OpenAPI: $openapiUrl"
          $openapi = Invoke-RestMethod -Uri $openapiUrl -TimeoutSec 15

          $requiredPaths = @("/market", "/commodities", "/news")
          foreach ($path in $requiredPaths) {
            if (-not $openapi.paths.PSObject.Properties.Name.Contains($path)) {
              throw "Post-deploy verification failed. Missing route in OpenAPI: $path"
            }
          }

          Write-Host "Post-deploy verification passed. All expected routes are live."
