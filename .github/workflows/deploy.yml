name: Deploy to Windows Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command "& '{0}'"

    env:
      DEPLOY_DIR: C:\PersonalProjects\econatlas-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to deployment directory
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path $env:DEPLOY_DIR)) {
            New-Item -ItemType Directory -Path $env:DEPLOY_DIR -Force | Out-Null
          }
          robocopy . $env:DEPLOY_DIR /MIR /XD .git .github _work /XF .env .DS_Store firebase-key.json
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          else { throw "robocopy failed with exit code $LASTEXITCODE" }

      - name: Rebuild and restart app container
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location $env:DEPLOY_DIR
          docker compose build app
          docker compose up -d --force-recreate app
          Start-Sleep -Seconds 8
          $health = (Invoke-WebRequest -Uri http://127.0.0.1:8000/ops/health -UseBasicParsing -TimeoutSec 10).StatusCode
          if ($health -ne 200) { throw "Backend did not return 200 OK after redeploy" }
          Write-Host "Deploy OK - /ops/health returned $health"
