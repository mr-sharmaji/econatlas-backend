name: Deploy with Docker Compose

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command "& '{0}'"

    env:
      DEPLOY_DIR: C:\PersonalProjects\econatlas-backend
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to deployment directory
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path $env:DEPLOY_DIR)) {
            New-Item -ItemType Directory -Path $env:DEPLOY_DIR -Force | Out-Null
          }
          robocopy . $env:DEPLOY_DIR /MIR `
            /XD .git .github __pycache__ _work logs .venv `
            /XF .env .DS_Store
          if ($LASTEXITCODE -gt 7) { throw "robocopy failed with exit code $LASTEXITCODE" }
          $global:LASTEXITCODE = 0

      - name: Write Firebase credentials
        if: env.FIREBASE_CREDENTIALS_JSON != ''
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          $ErrorActionPreference = "Stop"
          [System.IO.File]::WriteAllText("$env:DEPLOY_DIR\firebase-key.json", $env:FIREBASE_CREDENTIALS_JSON, [System.Text.UTF8Encoding]::new($false))
          Write-Host "Firebase credentials written to deploy directory"

      - name: Deploy with Docker Compose
        # Only rebuild and recreate the app container. --no-deps keeps
        # postgres/redis untouched, which avoids the "database system is
        # not yet accepting connections" WAL-recovery window and the
        # "self-heal after prior SIGKILL" stale-cleanup path we hit on
        # 2026-04-17T09:49 UTC (PG restart dropped 48 ops_logs inserts
        # and caused APScheduler misfires).
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location $env:DEPLOY_DIR
          docker compose up -d --no-deps --build app
          docker compose ps
