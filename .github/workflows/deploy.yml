name: Deploy to Windows Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command "& '{0}'"

    env:
      DEPLOY_DIR: C:\PersonalProjects\econatlas-backend
      SERVICE_NAME: econatlas-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to deployment directory
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path $env:DEPLOY_DIR)) {
            New-Item -ItemType Directory -Path $env:DEPLOY_DIR -Force | Out-Null
          }

          # Mirror source to deploy dir, preserving .env and .venv
          robocopy . $env:DEPLOY_DIR /MIR `
            /XD .git .github .venv __pycache__ _work logs `
            /XF .env .DS_Store
          # robocopy exit codes 0-7 are success
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          else { throw "robocopy failed with exit code $LASTEXITCODE" }

      - name: Set up virtual environment and install dependencies
        run: |
          $ErrorActionPreference = "Stop"
          $venv = Join-Path $env:DEPLOY_DIR ".venv"
          $pip  = Join-Path $venv "Scripts\pip.exe"

          if (-not (Test-Path (Join-Path $venv "Scripts\python.exe"))) {
            Write-Host "Creating virtual environment..."
            python -m venv $venv
          }

          Write-Host "Installing dependencies..."
          & $pip install --upgrade pip --quiet
          & $pip install -r (Join-Path $env:DEPLOY_DIR "requirements.txt") --quiet

      - name: Find NSSM
        run: |
          $nssm = (Get-Command nssm -ErrorAction SilentlyContinue).Source
          if (-not $nssm) {
            $candidates = @(
              "C:\Program Files\NSSM\win64\nssm.exe",
              "C:\Program Files (x86)\NSSM\win64\nssm.exe",
              "C:\ProgramData\chocolatey\bin\nssm.exe"
            )
            foreach ($c in $candidates) {
              if (Test-Path $c) { $nssm = $c; break }
            }
          }
          if (-not $nssm) {
            $found = Get-ChildItem -Path "C:\" -Filter "nssm.exe" -Recurse -Depth 5 -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $nssm = $found.FullName }
          }
          if (-not $nssm) { throw "Cannot find nssm.exe. Install it system-wide." }
          Write-Host "Found nssm at: $nssm"
          echo "NSSM_PATH=$nssm" >> $env:GITHUB_ENV

      - name: Restart Windows service
        run: |
          $ErrorActionPreference = "Continue"
          & $env:NSSM_PATH restart $env:SERVICE_NAME
          $ErrorActionPreference = "Stop"

          Start-Sleep -Seconds 5
          $status = & $env:NSSM_PATH status $env:SERVICE_NAME
          Write-Host "Service status: $status"
          if ($status -notmatch "SERVICE_RUNNING") {
            throw "Service is not running after restart"
          }
          Write-Host "Deployment successful!"
