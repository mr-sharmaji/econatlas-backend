name: Deploy to Windows Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    env:
      DEPLOY_DIR: C:\econatlas-backend
      SERVICE_NAME: econatlas-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to deployment directory
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path $env:DEPLOY_DIR)) {
            New-Item -ItemType Directory -Path $env:DEPLOY_DIR -Force | Out-Null
          }

          # Mirror source to deploy dir, preserving .env and .venv
          robocopy . $env:DEPLOY_DIR /MIR `
            /XD .git .github .venv __pycache__ _work `
            /XF .env .DS_Store
          # robocopy exit codes 0-7 are success
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          else { throw "robocopy failed with exit code $LASTEXITCODE" }

      - name: Set up virtual environment and install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $venv = Join-Path $env:DEPLOY_DIR ".venv"
          $pip  = Join-Path $venv "Scripts\pip.exe"

          if (-not (Test-Path (Join-Path $venv "Scripts\python.exe"))) {
            Write-Host "Creating virtual environment..."
            python -m venv $venv
          }

          Write-Host "Installing dependencies..."
          & $pip install --upgrade pip --quiet
          & $pip install -r (Join-Path $env:DEPLOY_DIR "requirements.txt") --quiet

      - name: Restart Windows service
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $status = nssm status $env:SERVICE_NAME 2>&1
          if ($status -match "SERVICE_STOPPED") {
            Write-Host "Starting service..."
            nssm start $env:SERVICE_NAME
          } else {
            Write-Host "Restarting service..."
            nssm restart $env:SERVICE_NAME
          }

          Start-Sleep -Seconds 5
          $status = nssm status $env:SERVICE_NAME
          Write-Host "Service status: $status"
          if ($status -notmatch "SERVICE_RUNNING") {
            throw "Service is not running after restart"
          }
          Write-Host "Deployment successful!"
