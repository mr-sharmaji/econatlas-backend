---
# Grafana unified alerting rules for EconAtlas.
#
# Thresholds are intentionally conservative so we don't spam the on-call
# channel on normal variance:
#   - Market scoring stale > 6h                  (critical)
#   - DLQ size > 0 for 10 min                    (warning)
#   - Stock intraday autofill coverage < 70 %    (warning, sustained 10 min)
#   - Scheduler heartbeat age > 5 min            (critical)
#   - External API error rate > 25 % / 15 min    (warning)
#   - Data freshness > 6h on critical tables     (warning)
#   - Job misfires > 0 in last 15 min            (warning)
#
# All rules fire once the `for:` window has elapsed to suppress spikes.
apiVersion: 1

groups:
  - orgId: 1
    name: econatlas-reliability
    folder: EconAtlas
    interval: 1m
    rules:
      - uid: econatlas-scheduler-heartbeat
        title: Scheduler loop silent
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (time() - scheduler_heartbeat_timestamp_seconds) > 300
              instant: true
              refId: A
        # KeepLastState avoids false critical pages when Prometheus
        # briefly can't scrape /metrics during a deploy (seen
        # 2026-04-17: NoData-state pages fired even though scheduler
        # and DB were healthy). A real scheduler stall still flips the
        # expression to true and fires correctly.
        noDataState: KeepLast
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: APScheduler heartbeat older than 5 minutes
          description: |
            The scheduler loop has not ticked in more than 5 minutes.
            No cron jobs are firing. Check the backend process and
            event loop for deadlocks.

      - uid: econatlas-dlq-nonzero
        title: ARQ DLQ non-empty
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: arq_dlq_size > 0
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Dead letter queue non-empty for 10 minutes
          description: |
            One or more background jobs have exhausted their retries
            and landed in the DLQ. Inspect job_dead_letters in the DB.

      - uid: econatlas-autofill-coverage
        title: Stock intraday autofill coverage < 70%
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: autofill_coverage_ratio{job_name="discover_stock_intraday_autofill"} < 0.7
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Stock intraday autofill is filling less than 70% of target symbols
          description: |
            The autofill sweep has not reached 70% coverage for 10 minutes.
            Check Upstox / Yahoo rate limits and the instrument master cache.

      # ── Data freshness alerts — per-cadence thresholds ──────────
      # Each table gets a threshold matched to its schedule + a buffer.
      # Threshold = normal_gap × 1.5 so we don't alert during normal
      # overnight/weekend gaps but DO alert if a scheduled run misses.

      - uid: econatlas-freshness-hourly
        title: Hourly table stale > 3h
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                max by (source) (data_freshness_age_seconds{
                  source="market_scores"
                }) > 10800
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.source }} stale > 3 hours (hourly job)"
          description: |
            {{ $labels.source }} hasn't been written in over 3 hours.
            The hourly market_score job may have failed.

      # Daily stock cron: Mon-Fri 16:00 IST = 10:30 UTC.
      # Evaluated only Mon-Fri UTC after 11:00 UTC (16:30 IST, i.e. 30
      # min after the scheduled run) so weekend gaps and pre-cron
      # morning windows don't page.
      - uid: econatlas-freshness-daily-stock
        title: Daily stock tables stale > 26h
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                (
                  max by (source) (data_freshness_age_seconds{
                    source=~"discover_stock_snapshots|discover_stock_price_history"
                  }) > 93600
                )
                and on() (day_of_week() > 0 and day_of_week() < 6)
                and on() ((hour() * 60 + minute()) >= 660)
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.source }} stale > 26 hours (daily 16:00-16:30 IST)"
          description: |
            {{ $labels.source }} hasn't been written in over 26 hours.
            The daily discover_stock or discover_stock_price job
            likely failed or was skipped.

      # Daily MF cron: Mon-Fri 22:00 IST = 16:30 UTC.
      # Evaluated only Mon-Fri UTC after 17:00 UTC (22:30 IST).
      - uid: econatlas-freshness-daily-mf
        title: Daily MF tables stale > 26h
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                (
                  max by (source) (data_freshness_age_seconds{
                    source=~"discover_mutual_fund_snapshots|discover_mf_nav_history"
                  }) > 93600
                )
                and on() (day_of_week() > 0 and day_of_week() < 6)
                and on() (hour() >= 17)
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.source }} stale > 26 hours (daily 22:00-22:30 IST)"
          description: |
            {{ $labels.source }} hasn't been written in over 26 hours.
            The daily discover_mutual_funds or discover_mf_nav job
            likely failed or was skipped.

      - uid: econatlas-freshness-weekly
        title: Weekly table stale > 8 days
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                max by (source) (data_freshness_age_seconds{
                  source="broker_charges"
                }) > 691200
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "broker_charges stale > 8 days (weekly Sunday job)"
          description: |
            broker_charges hasn't been refreshed in over 8 days.
            The weekly broker_charges scraper likely failed.

      - uid: econatlas-ext-api-error-rate
        title: External API error rate > 25%
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                (
                  sum by (provider) (rate(external_api_requests_total{status!="ok"}[15m]))
                  /
                  clamp_min(sum by (provider) (rate(external_api_requests_total[15m])), 0.0001)
                ) > 0.25
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.provider }} error rate above 25% for 15 minutes"
          description: |
            More than one in four outbound calls to {{ $labels.provider }}
            is returning a non-2xx, timeout, or error.

      - uid: econatlas-db-pool-exhaustion
        title: 🔴 DB pool exhausted
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: db_pool_free == 0
              instant: true
              refId: A
        # KeepLastState so a brief Prometheus scrape gap during deploys
        # doesn't flip this critical rule into NoData-firing state.
        # A real pool-exhaustion still fires (expression evaluates true).
        noDataState: KeepLast
        execErrState: Alerting
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: All database pool connections are in use
          description: |
            db_pool_free has been 0 for 30+ seconds. Every incoming
            request blocks waiting for a connection. This typically
            means too many heavy jobs are running concurrently —
            check /ops/jobs/running and system_load_avg_1m.

      - uid: econatlas-job-misfires
        title: Scheduler job misfires
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: sum(increase(job_misfires_total[15m])) > 10
              instant: true
              refId: A
        noDataState: OK
        execErrState: Alerting
        # Threshold 10 + 10m sustain — a deploy or a heavy-job sync
        # sweep can legitimately produce 3-8 misfires in its wake
        # (30-second market/commodity/crypto ticks drift by a few
        # seconds while the event loop recovers), and those shouldn't
        # page. A real deadlock produces dozens within a 15m window.
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: APScheduler reported >10 missed jobs in the last 15 minutes
          description: |
            One or more cron jobs ran past their misfire_grace_time and
            were skipped. Check runner.py listener output and load.
